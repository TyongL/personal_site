<style>

.scanline-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));

  pointer-events: none;
  z-index: 100;
  opacity: 0.15;
}
.chamfer {
  clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
}
.chamfer-sm {
  clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
}
.glitch-text {
  text-shadow: 2px 0 #ff51fa, -2px 0 #00d2fd;
  animation: glitch-anim 5s infinite;
}
@keyframes glitch-anim {
  0% { text-shadow: 2px 0 #ff51fa, -2px 0 #00d2fd; }
  2% { text-shadow: -2px 0 #ff51fa, 2px 0 #00d2fd; }
  4% { text-shadow: 2px 0 #ff51fa, -2px 0 #00d2fd; transform: skewX(1deg); }
  6% { transform: skewX(0); }
  100% { text-shadow: 2px 0 #ff51fa, -2px 0 #00d2fd; }
}

<body class="font-body selection:bg-tertiary-container selection:text-on-tertiary-container">
<div class="scanline-overlay"></div>
<div class="fixed inset-0 pointer-events-none opacity-20">

  <div class="absolute top-[12%] left-[4%] text-[92px] font-black font-orbitron text-secondary/5 select-none rotate-90">SALES</div>
  <div class="absolute bottom-[12%] right-[3%] text-[74px] font-black font-orbitron text-tertiary/5 select-none">TRAINING_PLATFORM</div>
</div>

</header>

<main class="pt-28 pb-8 px-4 md:px-8 max-w-7xl mx-auto space-y-4">
  <section class="space-y-5">
    <div class="max-w-4xl space-y-5">
      <p class="font-mono text-tertiary text-xs uppercase tracking-[0.35em]">PRJ_CODE: SALES_TRAIN</p>
      <h1 class="text-4xl md:text-6xl font-orbitron font-black tracking-tight glitch-text">销售成长平台</h1>
      <p class="max-w-3xl font-mono text-on-surface-variant leading-7 text-sm md:text-base">
        项目围绕训练、陪练、复盘与成长追踪搭建 AI 训战平台，把销售团队培养从经验驱动推进到过程可量化、结果可追踪的产品体系。
      </p>

        <span class="px-4 py-2 bg-secondary/10 border border-secondary/30 chamfer-sm text-secondary">销售训练</span>
        <span class="px-4 py-2 bg-tertiary/10 border border-tertiary/30 chamfer-sm text-tertiary">陪练复盘</span>

      </div>

  <section class="pdf-shell relative bg-surface-container-high/90 border border-tertiary/20 chamfer overflow-hidden">

  <div class="mt-1 flex flex-wrap items-center justify-center gap-4 rounded-sm border border-tertiary/25 bg-gradient-to-r from-tertiary/10 via-surface-container-high to-primary/10 px-5 py-5 shadow-[0_0_32px_rgba(109,221,255,0.12)]">

<div class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/75 backdrop-blur-md px-4" id="wechat-modal">
  <div class="w-full max-w-sm bg-surface-container-high border border-primary/40 chamfer p-6 text-center relative">
    <button class="absolute top-3 right-3 text-primary/70 hover:text-primary" data-close-modal="wechat-modal" type="button">
      <span class="material-symbols-outlined">close</span>
    </button>
    <p class="font-mono text-[10px] text-primary/60 uppercase tracking-[0.3em]">Personal WeChat</p>
    <h2 class="mt-3 font-orbitron text-2xl font-black text-on-surface">联系我</h2>
    <div class="mt-6 bg-white/95 p-4 inline-block">
      <img alt="个人微信二维码" class="w-56 h-56 object-contain" src="assets/images/weixin.png"/>
    </div>
    <p class="mt-4 font-mono text-sm text-on-surface-variant">扫码后可直接添加微信交流。</p>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const modal = document.getElementById("wechat-modal");
  document.querySelectorAll("[data-modal-target]").forEach((button) => {
    button.addEventListener("click", function () {
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    });
  });

  document.querySelectorAll("[data-close-modal]").forEach((button) => {
    button.addEventListener("click", function () {
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    });
  });

  modal.addEventListener("click", function (event) {
    if (event.target === modal) {
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }
  });
});
</script>
